<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库页面</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700&display=swap");

    :root {
      --bg: #f6f4ef;
      --panel: rgba(255, 255, 255, 0.92);
      --line: #e6e1d4;
      --text: #1f2533;
      --muted: #7c7a72;
      --ink: #14171e;
      --warm: #a3501a;
      --cool: #4a2d6a;
      --shadow: 0 24px 64px rgba(20, 23, 30, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Outfit", -apple-system, "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(at 0% 0%, rgba(163, 80, 26, .06) 0%, transparent 42%),
        radial-gradient(at 100% 0%, rgba(74, 45, 106, .05) 0%, transparent 40%),
        linear-gradient(180deg, #faf8f3 0%, #f3efe6 100%);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px 72px;
    }

    .hero,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 34px 36px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #f9f6ee 0%, #ece6d6 100%);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    h1 {
      margin: 10px 0 12px;
      font-family: "DM Serif Display", Georgia, serif;
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 400;
      line-height: 1.08;
      color: var(--ink);
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 70px rgba(20, 23, 30, 0.12);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: #f1ece1;
      color: var(--muted);
    }

    .card h2 {
      margin: 16px 0 10px;
      font-size: 24px;
      line-height: 1.1;
      color: var(--ink);
    }

    .card p {
      margin: 0;
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }

    .meta {
      margin-top: 18px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #f7f3eb;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .card.practice { border-color: rgba(107, 77, 34, 0.18); }
    .card.practice .tag { background: rgba(107, 77, 34, 0.08); color: #6b4d22; }
    .card.models { border-color: rgba(74, 45, 106, 0.18); }
    .card.models .tag { background: rgba(74, 45, 106, 0.08); color: #4a2d6a; }

    @media (max-width: 760px) {
      .wrap { padding: 18px 14px 48px; }
      .hero, .card { border-radius: 18px; }
      .hero { padding: 24px 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Knowledge Pages</div>
      <h1>知识库页面</h1>
      <p>这里收纳独立的知识库静态页面，当前包含行业头部实践与大模型库两个模块，保留原页面样式与内容，方便直接在仓库中访问和继续扩展。</p>
    </section>

    <section class="grid">
      <a class="card practice" href="./01-行业头部实践.html">
        <span class="tag">Industry Practice</span>
        <h2>行业头部实践</h2>
        <p>按战略咨询、营销实战、研报数据和 PPT/视觉几个维度，整理头部团队和优质资料源，适合用来搭行业认知框架。</p>
        <div class="meta">
          <span class="chip">行业案例</span>
          <span class="chip">资料源</span>
          <span class="chip">方法参考</span>
        </div>
      </a>

      <a class="card models" href="./02-大模型库.html">
        <span class="tag">Model Directory</span>
        <h2>大模型库</h2>
        <p>按 PPT、海报、文案、方案和数据五类场景，整理常用模型与工具入口，便于快速找到适合的能力组合。</p>
        <div class="meta">
          <span class="chip">工具地图</span>
          <span class="chip">场景分类</span>
          <span class="chip">模型索引</span>
        </div>
      </a>
    </section>
  </div>
</body>
</html>
