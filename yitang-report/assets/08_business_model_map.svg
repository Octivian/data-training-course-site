  <text x="515" y="325" class="note">先让用户觉得“超值”</text>

  <path class="line" d="M810 235 C865 235 880 235 935 235"/>
  <rect x="950" y="150" width="290" height="170" rx="20" class="box"/>
  <text x="990" y="210" class="h">作业与解锁</text>
  <text x="990" y="258" class="p">写作业解锁下一节课</text>
  <text x="990" y="298" class="p">转介绍解锁奖励课</text>

  <path class="line" d="M1250 235 C1305 235 1320 235 1375 235"/>
  <rect x="1385" y="150" width="145" height="170" rx="20" class="box"/>
  <text x="1418" y="210" class="h">转化</text>
  <text x="1410" y="258" class="p">年会员</text>
  <text x="1410" y="298" class="p">选课券</text>

  <rect x="135" y="440" width="330" height="210" rx="20" class="box"/>
  <text x="180" y="500" class="h">运营触达系统</text>
  <text x="180" y="550" class="p">群公告、私聊提醒、AI 外呼</text>
  <text x="180" y="590" class="p">排名、荣誉、小组竞争</text>
