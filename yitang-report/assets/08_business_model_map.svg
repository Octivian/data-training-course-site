  <text x="680" y="550" class="p">作业数据、案例反馈、群氛围</text>
  <text x="680" y="590" class="p">用户完成感与好感度</text>
  <text x="680" y="630" class="p">后续销售阻力下降</text>

  <rect x="1135" y="440" width="330" height="210" rx="20" class="box3"/>
  <text x="1180" y="500" class="h">收入阶梯</text>
  <text x="1180" y="550" class="p">1980 / 3380 / 5580 年会员</text>
  <text x="1180" y="590" class="p">高阶集训营、私董会、咨询</text>
  <text x="1180" y="630" class="p">续费与转介绍复利</text>

  <path class="line" d="M300 430 C365 350 505 335 635 340"/>
  <path class="line" d="M800 430 C800 370 830 330 940 305"/>
  <path class="line" d="M1300 430 C1330 360 1390 330 1448 324"/>
  <path class="line" d="M1300 670 C1100 785 555 790 300 660"/>
