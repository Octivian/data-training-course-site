<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c47900"/>
    </marker>
    <style>
      .bg{fill:#fff9f0}
      .box{fill:#fff;stroke:#e4c58f;stroke-width:3}
      .box2{fill:#fff4dc;stroke:#f4a100;stroke-width:4}
      .box3{fill:#fff;stroke:#d93838;stroke-width:4}
      .title{font:800 52px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#1c1c1c}
      .h{font:700 34px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#1e1e1e}
      .p{font:500 25px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#333}
      .note{font:600 25px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#b25a00}
      .line{stroke:#c47900;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="70" y="86" class="title">一堂运营模式雏型：重交付钩子课驱动的会员制生意</text>

  <rect x="70" y="150" width="250" height="170" rx="20" class="box"/>
