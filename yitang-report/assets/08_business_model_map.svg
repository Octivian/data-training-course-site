  <text x="105" y="258" class="p">公众号尾部广告位</text>
  <text x="105" y="298" class="p">9.9 元引流课</text>

  <path class="line" d="M330 235 C385 235 400 235 455 235"/>
  <rect x="470" y="135" width="330" height="200" rx="20" class="box2"/>
